<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Love is puzzle gift</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f2ed;
        color: #241f1d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(88vw, 680px);
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 72px);
        line-height: 1;
      }

      p,
      code {
        margin: 0;
        color: #756c66;
        font-size: 20px;
        line-height: 1.4;
      }

      code {
        display: block;
        padding: 14px 16px;
        border-radius: 12px;
        background: #fffaf7;
        color: #241f1d;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Love is puzzle</h1>
      <p>Публичный сервер подарка работает. Приложение загружает зашифрованные данные из файла:</p>
      <code>gift.enc.json</code>
    </main>
  </body>
</html>
